<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的讀書日誌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface2: #F4F2EE;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.06);
    --text: #1A1814;
    --text2: #6B6860;
    --text3: #9E9C96;
    --red: #993C1D;
    --red-light: #FAECE7;
    --red-mid: #F5C4B3;
    --red-dark: #712B13;
    --serif: 'Noto Serif TC', serif;
    --sans: 'Noto Sans TC', sans-serif;
  }

  html { font-size: 16px; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── NAV ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(250,250,247,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0 1.25rem;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
  }

  .nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    color: var(--red);
    font-size: 22px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:active { background: var(--red-light); }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── HOME ── */
  .home-hero {
    padding: 2rem 1.25rem 1.5rem;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
  }

  .home-eyebrow {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .home-heading {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
    margin-bottom: 0.25rem;
  }

  .home-sub {
    font-size: 13px;
    color: var(--text2);
  }

  .stats-row {
    display: flex;
    gap: 10px;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border2);
  }

  .stat-box {
    flex: 1;
    background: var(--surface2);
    border-radius: 10px;
    padding: 0.75rem;
    text-align: center;
  }

  .stat-num {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--red);
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  .section-head {
    padding: 1.25rem 1.25rem 0.5rem;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    font-weight: 500;
  }

  /* ── BOOK CARD ── */
  .book-card {
    background: var(--surface);
    margin: 0 1.25rem 0.75rem;
    border-radius: 14px;
    border: 0.5px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .book-card:active { transform: scale(0.98); }

  .book-card-inner {
    display: flex;
    align-items: stretch;
    gap: 0;
  }

  .book-spine {
    width: 5px;
    background: var(--red);
    flex-shrink: 0;
  }

  .book-card-body {
    flex: 1;
    padding: 1rem 1rem 1rem 0.875rem;
  }

  .book-card-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  .book-card-meta {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .book-card-chapters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chapter-pill {
    font-size: 11px;
    background: var(--red-light);
    color: var(--red-dark);
    border-radius: 20px;
    padding: 3px 9px;
    font-weight: 500;
  }

  .book-card-arrow {
    padding: 1rem 1rem 1rem 0;
    display: flex;
    align-items: center;
    color: var(--text3);
    font-size: 18px;
  }

  /* ── ADD BOOK BTN ── */
  .add-book-btn {
    background: var(--surface);
    margin: 0 1.25rem 2rem;
    border-radius: 14px;
    border: 0.5px dashed var(--border);
    padding: 1rem;
    width: calc(100% - 2.5rem);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text3);
    font-size: 14px;
    font-family: var(--sans);
    transition: background 0.15s, color 0.15s;
  }
  .add-book-btn:active { background: var(--red-light); color: var(--red); }

  /* ── BOOK DETAIL ── */
  .book-detail-header {
    background: var(--surface);
    padding: 1.5rem 1.25rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .book-seal {
    width: 52px;
    height: 52px;
    background: var(--red);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 11px;
    font-weight: 700;
    color: #FDE8E0;
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .book-detail-info { flex: 1; }

  .book-detail-title {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 3px;
  }

  .book-detail-sub {
    font-size: 12px;
    color: var(--text3);
  }

  .chapter-list-item {
    background: var(--surface);
    margin: 0 1.25rem 0.75rem;
    border-radius: 12px;
    border: 0.5px solid var(--border);
    padding: 1rem 1rem 1rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.875rem;
    transition: transform 0.15s;
  }
  .chapter-list-item:active { transform: scale(0.98); }

  .chapter-num-badge {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: var(--red-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 700;
    color: var(--red-dark);
    flex-shrink: 0;
  }

  .chapter-list-body { flex: 1; min-width: 0; }

  .chapter-list-title {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chapter-list-date {
    font-size: 11px;
    color: var(--text3);
  }

  .chapter-list-arrow {
    color: var(--text3);
    font-size: 18px;
  }

  .add-chapter-btn {
    background: none;
    border: 0.5px dashed var(--border);
    border-radius: 12px;
    width: calc(100% - 2.5rem);
    margin: 0 1.25rem 2rem;
    padding: 0.875rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text3);
    font-size: 14px;
    font-family: var(--sans);
    transition: background 0.15s, color 0.15s;
  }
  .add-chapter-btn:active { background: var(--red-light); color: var(--red); }

  /* ── CHAPTER DETAIL ── */
  .chapter-hero {
    background: var(--surface);
    padding: 1.25rem 1.25rem 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }

  .chapter-hero-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .chapter-seal-lg {
    width: 54px;
    height: 54px;
    background: var(--red);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 12px;
    font-weight: 700;
    color: #FDE8E0;
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .chapter-hero-info { flex: 1; }

  .chapter-eyebrow-sm {
    font-size: 11px;
    color: var(--red);
    letter-spacing: 0.1em;
    font-weight: 500;
    margin-bottom: 3px;
  }

  .chapter-title-lg {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
    margin-bottom: 2px;
  }

  .chapter-date-sm {
    font-size: 11px;
    color: var(--text3);
  }

  /* ── NOTE BLOCKS ── */
  .note-section {
    padding: 1.25rem 1.25rem 0;
  }

  .note-section-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.12em;
    font-weight: 500;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
  }

  .note-tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .note-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.875rem;
  }

  .note-tag-icon {
    font-size: 15px;
    color: var(--red);
  }

  .note-tag-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .tactic-list { margin-bottom: 1.5rem; }

  .tactic-item {
    background: var(--surface);
    border-radius: 10px;
    border: 0.5px solid var(--border);
    padding: 0.875rem;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .tactic-ctx {
    font-size: 11px;
    background: var(--surface2);
    border-radius: 5px;
    padding: 3px 8px;
    color: var(--text2);
    white-space: nowrap;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .tactic-content { flex: 1; }
  .tactic-main { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .tactic-sub { font-size: 12px; color: var(--text3); line-height: 1.6; }

  .technique-card-mobile {
    background: var(--surface);
    border-radius: 10px;
    border: 0.5px solid var(--border);
    padding: 0.875rem;
    margin-bottom: 8px;
  }

  .technique-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .technique-name {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  .technique-badge {
    font-size: 10px;
    background: var(--red-light);
    color: var(--red);
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 500;
  }

  .technique-body {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.75;
  }

  .flow-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .flow-pill {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 4px 9px;
  }

  .flow-arr { color: var(--red); font-size: 14px; }

  .raw-notes {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.9;
    white-space: pre-wrap;
    word-break: break-all;
    margin-bottom: 1.5rem;
    font-family: var(--sans);
  }

  /* ── FORMS ── */
  .form-view { padding: 1.25rem; }

  .form-title {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1.5rem;
    letter-spacing: 0.04em;
  }

  .form-group { margin-bottom: 1.125rem; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 15px;
    font-family: var(--sans);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--red);
  }

  .form-textarea {
    min-height: 140px;
    resize: vertical;
    line-height: 1.7;
  }

  .form-select { cursor: pointer; }

  .form-hint {
    font-size: 11px;
    color: var(--text3);
    margin-top: 5px;
  }

  .btn-primary {
    width: 100%;
    background: var(--red);
    color: #FDE8E0;
    border: none;
    border-radius: 12px;
    padding: 1rem;
    font-size: 16px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.04em;
  }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

  .btn-ghost {
    width: 100%;
    background: none;
    color: var(--text2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    font-size: 15px;
    font-family: var(--sans);
    cursor: pointer;
    margin-top: 0.5rem;
  }
  .btn-ghost:active { background: var(--surface2); }

  /* ── BOTTOM PADDING ── */
  .bottom-pad { height: 2.5rem; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1A1814;
    color: #F4F2EE;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--text3);
  }

  .empty-icon { font-size: 48px; margin-bottom: 1rem; }
  .empty-title { font-family: var(--serif); font-size: 18px; color: var(--text2); margin-bottom: 0.5rem; }
  .empty-sub { font-size: 13px; line-height: 1.6; }

  /* ── TABS ── */
  .detail-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 52px;
    z-index: 50;
  }

  .detail-tab {
    flex: 1;
    padding: 0.875rem 0;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }

  .detail-tab.active {
    color: var(--red);
    border-bottom-color: var(--red);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── DELETE BTN ── */
  .danger-zone {
    padding: 1.25rem;
    margin-top: 0.5rem;
  }

  .btn-danger {
    width: 100%;
    background: none;
    color: #C0392B;
    border: 0.5px solid #F5C4B3;
    border-radius: 12px;
    padding: 0.875rem;
    font-size: 14px;
    font-family: var(--sans);
    cursor: pointer;
  }
  .btn-danger:active { background: #FAECE7; }

  /* scrollbar */
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn" id="nav-back" onclick="navBack()" style="display:none;">&#8592;</button>
  <span class="nav-title" id="nav-title">讀書日誌</span>
  <button class="nav-btn" id="nav-add" onclick="navAdd()">&#43;</button>
</nav>

<!-- ═══════════════ VIEW: HOME ═══════════════ -->
<div class="view active" id="view-home">
  <div class="home-hero">
    <div class="home-eyebrow">MY READING JOURNAL</div>
    <div class="home-heading">我的讀書日誌</div>
    <div class="home-sub" id="home-sub-date">記錄每一本書帶給你的收穫</div>
  </div>
  <div class="stats-row">
    <div class="stat-box">
      <span class="stat-num" id="stat-books">0</span>
      <div class="stat-label">本書</div>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="stat-chapters">0</span>
      <div class="stat-label">篇心得</div>
    </div>
  </div>
  <div class="section-head">書架</div>
  <div id="book-list"></div>
  <button class="add-book-btn" onclick="showAddBook()">&#43; 新增書本</button>
  <div class="bottom-pad"></div>
</div>

<!-- ═══════════════ VIEW: BOOK DETAIL ═══════════════ -->
<div class="view" id="view-book">
  <div id="book-header-content"></div>
  <div class="section-head" style="padding-top:1.25rem;">章節心得</div>
  <div id="chapter-list"></div>
  <button class="add-chapter-btn" onclick="showAddChapter()">&#43; 新增章節心得</button>
  <div class="danger-zone">
    <button class="btn-danger" onclick="deleteCurrentBook()">刪除此書</button>
  </div>
  <div class="bottom-pad"></div>
</div>

<!-- ═══════════════ VIEW: CHAPTER DETAIL ═══════════════ -->
<div class="view" id="view-chapter">
  <div id="chapter-hero-content"></div>
  <div id="chapter-body-content"></div>
  <div class="danger-zone" style="display:flex; flex-direction:column; gap:10px;">
    <button class="btn-ghost" style="margin-top:0;" onclick="showEditChapter()">✏️ 編輯此章節</button>
    <button class="btn-danger" onclick="deleteCurrentChapter()">刪除此章節</button>
  </div>
  <div class="bottom-pad"></div>
</div>

<!-- ═══════════════ VIEW: ADD BOOK ═══════════════ -->
<div class="view" id="view-add-book">
  <div class="form-view">
    <div class="form-title">新增書本</div>
    <div class="form-group">
      <label class="form-label">書名</label>
      <input class="form-input" id="input-book-title" type="text" placeholder="例：辦事兵法" maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">作者（選填）</label>
      <input class="form-input" id="input-book-author" type="text" placeholder="例：作者名" maxlength="30">
    </div>
    <button class="btn-primary" onclick="saveBook()">儲存</button>
    <button class="btn-ghost" onclick="navBack()">取消</button>
  </div>
</div>

<!-- ═══════════════ VIEW: ADD CHAPTER ═══════════════ -->
<div class="view" id="view-add-chapter">
  <div class="form-view">
    <div class="form-title" id="add-chapter-form-title">新增章節心得</div>
    <div class="form-group">
      <label class="form-label">章節名稱</label>
      <input class="form-input" id="input-chapter-title" type="text" placeholder="例：攻心計" maxlength="20">
    </div>
    <div class="form-group">
      <label class="form-label">原始筆記</label>
      <textarea class="form-textarea" id="input-chapter-notes" placeholder="把手寫筆記、劃線段落、學到的東西都寫在這裡..." style="min-height:200px;"></textarea>
      <div class="form-hint">AI 會自動幫你整理成結構化心得</div>
    </div>
    <button class="btn-primary" onclick="saveChapter()">儲存並整理</button>
    <button class="btn-ghost" onclick="navBack()">取消</button>
  </div>
  <div class="bottom-pad"></div>
</div>

<!-- ═══════════════ VIEW: EDIT CHAPTER ═══════════════ -->
<div class="view" id="view-edit-chapter">
  <div class="form-view">
    <div class="form-title">編輯章節心得</div>
    <div class="form-group">

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DATA_DOC = doc(db, 'journal', 'main');

/* ─────────── IN-MEMORY CACHE ─────────── */
let _cache = { books: [] };

async function loadData() {
  try {
    const snap = await getDoc(DATA_DOC);
    if (snap.exists()) _cache = snap.data();
    else _cache = { books: [] };
  } catch(e) {
    console.warn('Firebase read failed, using cache', e);
  }
  return _cache;
}

async function saveData(data) {
  _cache = data;
  try {
    await setDoc(DATA_DOC, data);
  } catch(e) {
    console.error('Firebase write failed', e);
    showToast('⚠️ 儲存失敗，請檢查網路');
  }
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

/* ─────────── REAL-TIME SYNC ─────────── */
function startRealtimeSync() {
  onSnapshot(DATA_DOC, (snap) => {
    if (snap.exists()) {
      _cache = snap.data();
      // Re-render current view silently
      if (state.view === 'home') renderHome();
      else if (state.view === 'book') renderBook();
    }
  }, (err) => console.warn('Snapshot error', err));
}

/* ─────────── STATE ─────────── */
let state = { view: 'home', bookId: null, chapterId: null, history: [] };

/* ─────────── NAV ─────────── */
function showView(name, pushHistory = true) {
  if (pushHistory) state.history.push(state.view);
  state.view = name;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');

  const backBtn = document.getElementById('nav-back');
  const addBtn = document.getElementById('nav-add');
  const title = document.getElementById('nav-title');

  const noBack = ['home', 'add-book', 'add-chapter'];
  const noAdd = ['add-book', 'add-chapter'];

  backBtn.style.display = noBack.includes(name) ? 'none' : 'flex';
  addBtn.style.display = noAdd.includes(name) ? 'none' : 'flex';

  const titles = {
    'home': '讀書日誌',
    'book': currentBook()?.title || '書本',
    'chapter': currentChapter()?.title || '章節',
    'add-book': '新增書本',
    'add-chapter': '章節心得',
    'edit-chapter': '編輯心得'
  };
  title.textContent = titles[name] || '讀書日誌';

  window.scrollTo(0, 0);
}

function navBack() {
  const prev = state.history.pop();
  if (prev) showView(prev, false);
  else showView('home', false);
}

function navAdd() {
  if (state.view === 'home') showAddBook();
  else if (state.view === 'book') showAddChapter();
}

/* ─────────── HELPERS ─────────── */
function currentBook() {
  return _cache.books.find(b => b.id === state.bookId) || null;
}

function currentChapter() {
  const b = currentBook();
  if (!b) return null;
  return b.chapters.find(c => c.id === state.chapterId) || null;
}

function sealText(title) {
  const chars = [...title].slice(0, 4);
  if (chars.length <= 2) return chars.join('<br>');
  if (chars.length === 3) return chars[0] + '<br>' + chars.slice(1).join('');
  return chars.slice(0, 2).join('') + '<br>' + chars.slice(2).join('');
}

/* ─────────── TOAST ─────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

/* ─────────── HOME ─────────── */
function renderHome() {
  const data = _cache;
  const totalChapters = data.books.reduce((a, b) => a + b.chapters.length, 0);
  document.getElementById('stat-books').textContent = data.books.length;
  document.getElementById('stat-chapters').textContent = totalChapters;

  const today = new Date();
  const fmt = today.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('home-sub-date').textContent = fmt;

  const listEl = document.getElementById('book-list');
  if (data.books.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-title">書架還是空的</div><div class="empty-sub">點右上角 ＋ 或下方按鈕，<br>新增你的第一本書吧！</div></div>`;
    return;
  }
  listEl.innerHTML = data.books.map(book => `
    <div class="book-card" onclick="openBook('${book.id}')">
      <div class="book-card-inner">
        <div class="book-spine"></div>
        <div class="book-card-body">
          <div class="book-card-title">${esc(book.title)}</div>
          <div class="book-card-meta">${book.author ? esc(book.author) + '　' : ''}${book.chapters.length} 篇心得</div>
          <div class="book-card-chapters">
            ${book.chapters.slice(0,4).map(c => `<span class="chapter-pill">${esc(c.title)}</span>`).join('')}
            ${book.chapters.length > 4 ? `<span class="chapter-pill">+${book.chapters.length - 4}</span>` : ''}
          </div>
        </div>
        <div class="book-card-arrow">&#8250;</div>
      </div>
    </div>
  `).join('');
}

/* ─────────── BOOK DETAIL ─────────── */
function openBook(bookId) {
  state.bookId = bookId;
  state.chapterId = null;
  renderBook();
  showView('book');
}

function renderBook() {
  const book = currentBook();
  if (!book) return;

  document.getElementById('book-header-content').innerHTML = `
    <div class="book-detail-header">
      <div class="book-seal">${sealText(book.title)}</div>
      <div class="book-detail-info">
        <div class="book-detail-title">${esc(book.title)}</div>
        <div class="book-detail-sub">${book.author ? esc(book.author) + '　' : ''}${book.chapters.length} 篇心得</div>
      </div>
    </div>
  `;

  const listEl = document.getElementById('chapter-list');
  if (book.chapters.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">✍️</div><div class="empty-title">還沒有章節心得</div><div class="empty-sub">點下方按鈕新增你的第一篇心得</div></div>`;
    return;
  }
  listEl.innerHTML = book.chapters.map((ch, i) => `

      <div class="chapter-num-badge">${i + 1}</div>
      <div class="chapter-list-body">
        <div class="chapter-list-title">${esc(ch.title)}</div>
        <div class="chapter-list-date">${esc(ch.date)}</div>
      </div>
      <div class="chapter-list-arrow">&#8250;</div>
    </div>
  `).join('');

/* ─────────── AI ANALYSIS ─────────── */
async function analyzeNotes(title, notes) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: `你是一個讀書筆記整理助手。使用者會給你一個章節標題和原始筆記，請分析並輸出 JSON（不要有任何其他文字）：
{
  "keywords": ["關鍵詞1", "關鍵詞2", "關鍵詞3"],
  "tactics": [
    { "ctx": "情境標籤", "main": "策略名稱", "sub": "詳細說明" }
  ],
  "techniques": [
    { "name": "技法名稱", "badge": "分類標籤", "body": "說明內容", "flow": ["步驟1", "步驟2"] }
  ]
}
keywords 最多 5 個，tactics 和 techniques 各視內容決定數量，flow 若無流程則為空陣列。請用繁體中文。`,
        messages: [{ role: 'user', content: `章節：${title}\n\n筆記：\n${notes}` }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '{}';
    return JSON.parse(text.replace(/```json|```/g, '').trim());
  } catch(e) {
    console.error('AI analysis failed', e);
    return { keywords: [], tactics: [], techniques: [] };
  }
}

/* ─────────── CHAPTER DETAIL ─────────── */
function openChapter(chapterId) {
  state.chapterId = chapterId;
  renderChapter();
  showView('chapter');
}

function renderChapter() {
  const book = currentBook();
  const ch = currentChapter();
  if (!ch) return;

  document.getElementById('chapter-hero-content').innerHTML = `
    <div class="chapter-hero">
      <div class="chapter-hero-top">
        <div class="chapter-seal-lg">${sealText(ch.title)}</div>
        <div class="chapter-hero-info">
          <div class="chapter-eyebrow-sm">《${esc(book.title)}》</div>
          <div class="chapter-title-lg">${esc(ch.title)}</div>
          <div class="chapter-date-sm">${esc(ch.date)}</div>
        </div>
      </div>
    </div>
  `;

  const bodyEl = document.getElementById('chapter-body-content');

  // Keywords
  const kwHTML = (ch.keywords && ch.keywords.length > 0)
    ? `<div class="note-section"><div class="note-section-label">核心關鍵字</div><div class="note-tag-row">
        ${ch.keywords.filter(k => k.trim()).map(k => `<div class="note-tag"><span class="note-tag-icon">&#x2665;</span><span class="note-tag-text">${esc(k.trim())}</span></div>`).join('')}
      </div></div>` : '';

  // Tactics
  const tacticsHTML = (ch.tactics && ch.tactics.length > 0)
    ? `<div class="note-section"><div class="note-section-label">因人制宜策略</div><div class="tactic-list">
        ${ch.tactics.map(t => `<div class="tactic-item"><span class="tactic-ctx">${esc(t.ctx)}</span><div class="tactic-content"><div class="tactic-main">${esc(t.main)}</div><div class="tactic-sub">${esc(t.sub)}</div></div></div>`).join('')}
      </div></div>` : '';

  // Techniques
  const techHTML = (ch.techniques && ch.techniques.length > 0)
    ? `<div class="note-section"><div class="note-section-label">進階技法</div>
        ${ch.techniques.map(t => `
          <div class="technique-card-mobile">
            <div class="technique-title-row">
              <span class="technique-name">${esc(t.name)}</span>
              ${t.badge ? `<span class="technique-badge">${esc(t.badge)}</span>` : ''}
            </div>
            <div class="technique-body">${esc(t.body)}</div>
            ${t.flow && t.flow.length > 0 ? `<div class="flow-row">${t.flow.map((f,i) => `<span class="flow-pill">${esc(f)}</span>${i < t.flow.length-1 ? '<span class="flow-arr">→</span>' : ''}`).join('')}</div>` : ''}
          </div>`).join('')}
      </div>` : '';

  // Raw notes
  const rawHTML = ch.notes
    ? `<div class="note-section"><div class="note-section-label">原始筆記</div><div class="raw-notes">${esc(ch.notes)}</div></div>` : '';

  bodyEl.innerHTML = kwHTML + tacticsHTML + techHTML + rawHTML;
}

  await saveData(data);
  renderHome();
  showToast('📚 已新增「' + title + '」');
  navBack();
}

/* ─────────── ADD CHAPTER ─────────── */
function showAddChapter() {
  document.getElementById('input-chapter-title').value = '';
  document.getElementById('input-chapter-notes').value = '';
  const book = currentBook();
  if (book) document.getElementById('add-chapter-form-title').textContent = '《' + book.title + '》新增章節心得';
  showView('add-chapter');
}

async function saveChapter() {
  const title = document.getElementById('input-chapter-title').value.trim();
  const notes = document.getElementById('input-chapter-notes').value.trim();
  if (!title) { showToast('請輸入章節名稱'); return; }

  const btn = document.querySelector('#view-add-chapter .btn-primary');
  btn.textContent = '🤖 AI 整理中...';
  btn.disabled = true;

  const today = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
  const analysis = notes ? await analyzeNotes(title, notes) : { keywords: [], tactics: [], techniques: [] };

  const data = _cache;
  const book = data.books.find(b => b.id === state.bookId);
  if (!book) return;

  book.chapters.push({
    id: uid(), title, date: today, notes,
    keywords: analysis.keywords || [],
    tactics: analysis.tactics || [],
    techniques: analysis.techniques || []
  });

  await saveData(data);
  btn.textContent = '儲存並整理';
  btn.disabled = false;
  renderBook();
  showToast('✍️ 已儲存「' + title + '」');
  navBack();
}

/* ─────────── EDIT CHAPTER ─────────── */
function showEditChapter() {
  const ch = currentChapter();
  if (!ch) return;
  document.getElementById('edit-chapter-title').value = ch.title || '';
  document.getElementById('edit-chapter-notes').value = ch.notes || '';
  showView('edit-chapter');
}

async function updateChapter() {
  const title = document.getElementById('edit-chapter-title').value.trim();
  const notes = document.getElementById('edit-chapter-notes').value.trim();
  if (!title) { showToast('請輸入章節名稱'); return; }

  const btn = document.querySelector('#view-edit-chapter .btn-primary');
  btn.textContent = '🤖 AI 重新整理中...';
  btn.disabled = true;

  const analysis = notes ? await analyzeNotes(title, notes) : { keywords: [], tactics: [], techniques: [] };

  const data = _cache;
  const book = data.books.find(b => b.id === state.bookId);
  if (!book) return;
  const ch = book.chapters.find(c => c.id === state.chapterId);
  if (!ch) return;

  ch.title = title;
  ch.notes = notes;
  ch.keywords = analysis.keywords || [];
  ch.tactics = analysis.tactics || [];
  ch.techniques = analysis.techniques || [];

  await saveData(data);
  btn.textContent = '儲存並重新整理';
  btn.disabled = false;
  renderChapter();
  showToast('✅ 已儲存並重新整理');
  navBack();
}


async function deleteCurrentBook() {
  const book = currentBook();
  if (!book) return;
  if (!confirm('確定刪除《' + book.title + '》及所有章節心得？')) return;
  const data = _cache;
  data.books = data.books.filter(b => b.id !== state.bookId);
  await saveData(data);
  state.bookId = null;
  renderHome();
  showToast('已刪除');
  showView('home', false);
  state.history = [];
}

async function deleteCurrentChapter() {
  const ch = currentChapter();
  if (!ch) return;
  if (!confirm('確定刪除「' + ch.title + '」的心得？')) return;
  const data = _cache;
  const book = data.books.find(b => b.id === state.bookId);
  if (!book) return;
  book.chapters = book.chapters.filter(c => c.id !== ch.id);
  await saveData(data);
  state.chapterId = null;
  renderBook();
  showToast('已刪除');
  navBack();
}

/* ─────────── ESCAPE ─────────── */
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────── INIT ─────────── */
async function init() {
  // Show loading
  document.getElementById('book-list').innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">載入中...</div><div class="empty-sub">正在從雲端讀取資料</div></div>`;

  await seedAndMigrate();
  renderHome();
  startRealtimeSync();
}

// Make delete/save functions accessible from onclick handlers
window.openBook = openBook;
window.openChapter = openChapter;
window.navBack = navBack;
window.navAdd = navAdd;
window.showAddBook = showAddBook;
window.showAddChapter = showAddChapter;
window.showEditChapter = showEditChapter;
window.saveBook = saveBook;
window.saveChapter = saveChapter;
window.updateChapter = updateChapter;
window.deleteCurrentBook = deleteCurrentBook;
window.deleteCurrentChapter = deleteCurrentChapter;

init();
</script>
</body>
